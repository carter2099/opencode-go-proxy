name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -o "opencode-go-proxy-${{ matrix.goos }}-${{ matrix.goarch }}" .
          sha256sum "opencode-go-proxy-${{ matrix.goos }}-${{ matrix.goarch }}" > "opencode-go-proxy-${{ matrix.goos }}-${{ matrix.goarch }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            opencode-go-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
            opencode-go-proxy-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true

      - name: Checksums
        run: cat *.sha256 > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            opencode-go-proxy-*
            checksums.txt
          generate_release_notes: true
